naftiko: 1.0.0-alpha2
info:
  label: E*TRADE API — Order
  description: 'E*TRADE API — Order. 2 operations. Lead operation: Place order. Self-contained Naftiko capability covering
    one Etrade business surface.'
  tags:
  - Etrade
  - Order
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ETRADE_API_KEY: ETRADE_API_KEY
capability:
  consumes:
  - type: http
    namespace: etrade-order
    baseUri: https://api.etrade.com/v1
    description: E*TRADE API — Order business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountIdKey-orders-place
      path: /accounts/{accountIdKey}/orders/place
      operations:
      - name: placeorder
        method: POST
        description: Place order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountIdKey
          in: path
          type: string
          required: true
    - name: accounts-accountIdKey-orders-preview
      path: /accounts/{accountIdKey}/orders/preview
      operations:
      - name: previeworder
        method: POST
        description: Preview order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountIdKey
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: etrade-order-rest
    port: 8080
    description: REST adapter for E*TRADE API — Order. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/accounts/{accountidkey}/orders/place
      name: accounts-accountidkey-orders-place
      description: REST surface for accounts-accountIdKey-orders-place.
      operations:
      - method: POST
        name: placeorder
        description: Place order
        call: etrade-order.placeorder
        with:
          accountIdKey: rest.accountIdKey
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountidkey}/orders/preview
      name: accounts-accountidkey-orders-preview
      description: REST surface for accounts-accountIdKey-orders-preview.
      operations:
      - method: POST
        name: previeworder
        description: Preview order
        call: etrade-order.previeworder
        with:
          accountIdKey: rest.accountIdKey
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: etrade-order-mcp
    port: 9090
    transport: http
    description: MCP adapter for E*TRADE API — Order. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: place-order
      description: Place order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: etrade-order.placeorder
      with:
        accountIdKey: tools.accountIdKey
      outputParameters:
      - type: object
        mapping: $.
    - name: preview-order
      description: Preview order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: etrade-order.previeworder
      with:
        accountIdKey: tools.accountIdKey
      outputParameters:
      - type: object
        mapping: $.
