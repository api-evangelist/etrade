aid: etrade
name: Etrade
description: >-
  E*TRADE is an online brokerage firm that provides a platform for investors to trade stocks, options, futures, and
  bonds. The E*TRADE Developer Platform offers REST APIs for account management, real-time quotes, option chains, and
  order placement, secured by OAuth 1.0a. The APIs are available to E*TRADE customers who register through the developer
  portal and provide both a sandbox and production environment.
